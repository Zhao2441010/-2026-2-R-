<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有猫咪 - 校园猫咪</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .btn-back {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border: 2px solid #667eea;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: #667eea;
            color: white;
        }

        .header h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 2.2rem;
        }

        .subtitle {
            color: #7f8c8d;
            margin-top: 8px;
        }

        .filter-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-input, .filter-select {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            min-width: 200px;
            background: white;
        }

        .search-input:focus, .filter-select:focus {
            border-color: #667eea;
        }

        .cat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .cat-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }

        .cat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .image-wrapper {
            position: relative;
            height: 220px;
        }

        .cat-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .feed-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff6b6b;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .cat-info {
            padding: 18px;
            text-align: center;
        }

        .cat-info h3 {
            margin: 0;
            color: #2c3e50;
            font-size: 1.2rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #7f8c8d;
            font-size: 1.2rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            border: none;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #ff6b6b;
            color: white;
            transform: rotate(90deg);
        }

        .cat-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .image-section {
            position: relative;
            height: 100%;
            min-height: 400px;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px 0 0 24px;
        }

        .detail-feed-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }

        .info-section {
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .info-section h2 {
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .label {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value {
            font-size: 1.1rem;
            color: #2c3e50;
            font-weight: 600;
        }

        .status-yes { color: #27ae60; }
        .status-no { color: #e74c3c; }

        .owner-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .action-section {
            margin-top: auto;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-feed {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-feed:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-nofeed {
            background: #ecf0f1;
            color: #7f8c8d;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .cat-detail {
                grid-template-columns: 1fr;
            }
            .image-section {
                min-height: 300px;
            }
            .image-section img {
                border-radius: 24px 24px 0 0;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .btn-back {
                position: static;
                display: inline-block;
                margin-bottom: 15px;
                transform: none;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="container">
        <div class="header">
            <a href="/index.html" class="btn-back">← 返回</a>
            <h1>🐾 所有猫咪</h1>
            <p class="subtitle">共 {{ filteredCats.length }} 只小可爱</p>
        </div>

        <div class="filter-section">
            <input
                    v-model="searchQuery"
                    type="text"
                    placeholder="搜索猫咪名字..."
                    class="search-input"
            />
            <select v-model="filterFeed" class="filter-select">
                <option value="">全部状态</option>
                <option value="true">可投喂</option>
                <option value="false">不可投喂</option>
            </select>
        </div>

        <div class="cat-grid">
            <div
                    v-for="cat in filteredCats"
                    :key="cat.id"
                    class="cat-card"
                    @click="showDetail(cat.id)"
            >
                <div class="image-wrapper">
                    <!-- 修改：/images/ 改为 /pictures/ -->
                    <img :src="cat.image || '/pictures/default-cat.jpg'" :alt="cat.name" class="cat-image" />
                    <span v-if="cat.feed" class="feed-badge">可投喂</span>
                </div>
                <div class="cat-info">
                    <h3>{{ cat.name }}</h3>
                </div>
            </div>
        </div>

        <div v-if="filteredCats.length === 0" class="empty-state">
            <p>没有找到匹配的猫咪 😿</p>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div v-if="selectedCatId" class="modal-overlay" @click.self="closeDetail">
        <div class="modal-content">
            <button class="close-btn" @click="closeDetail">×</button>

            <div v-if="loading" class="loading">加载中...</div>

            <div v-else-if="catDetail" class="cat-detail">
                <div class="image-section">
                    <!-- 修改：/images/ 改为 /pictures/ -->
                    <img :src="catDetail.image || '/pictures/default-cat.jpg'" :alt="catDetail.name" />
                    <span v-if="catDetail.feed" class="detail-feed-badge">可投喂</span>
                </div>

                <div class="info-section">
                    <h2>{{ catDetail.name }}</h2>

                    <div class="info-grid">
                        <div class="info-item">
                            <span class="label">年龄</span>
                            <span class="value">{{ catDetail.age }} 岁</span>
                        </div>

                        <div class="info-item">
                            <span class="label">品种</span>
                            <span class="value">{{ catDetail.type || '未知' }}</span>
                        </div>

                        <div class="info-item">
                            <span class="label">健康状况</span>
                            <span class="value" :class="catDetail.health === 'HEALTHY' ? 'status-yes' : 'status-no'">
                                    {{ catDetail.health === 'HEALTHY' ? '健康' : '生病' }}
                                </span>
                        </div>

                        <div class="info-item">
                            <span class="label">绝育状态</span>
                            <span class="value" :class="catDetail.jueyu ? 'status-yes' : 'status-no'">
                                    {{ catDetail.jueyu ? '已绝育' : '未绝育' }}
                                </span>
                        </div>
                    </div>

                    <div class="owner-section" v-if="catDetail.owner">
                        <span class="label">主人ID</span>
                        <span class="value">#{{ catDetail.owner }}</span>
                    </div>

                    <div class="action-section">
                        <button
                                class="btn-action"
                                :class="catDetail.feed ? 'btn-feed' : 'btn-nofeed'"
                                @click="handleFeed"
                        >
                            {{ catDetail.feed ? '投喂猫咪' : '暂不可投喂' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
        setup() {
            const cats = ref([]);
            const selectedCatId = ref(null);
            const catDetail = ref(null);
            const loading = ref(false);
            const searchQuery = ref('');
            const filterFeed = ref('');

            // 获取所有猫
            const fetchCats = async () => {
                try {
                    const response = await axios.get('/api/cats/all');
                    cats.value = response.data;
                } catch (error) {
                    console.error('获取猫咪失败:', error);
                }
            };

            // 筛选后的猫咪
            const filteredCats = computed(() => {
                return cats.value.filter(cat => {
                    const matchName = cat.name.toLowerCase().includes(searchQuery.value.toLowerCase());
                    const matchFeed = filterFeed.value === '' ||
                        (filterFeed.value === 'true' && cat.feed) ||
                        (filterFeed.value === 'false' && !cat.feed);
                    return matchName && matchFeed;
                });
            });

            // 显示详情
            const showDetail = async (id) => {
                selectedCatId.value = id;
                loading.value = true;
                catDetail.value = null;

                try {
                    const response = await axios.get(`/api/cats/${id}`);
                    catDetail.value = response.data;
                } catch (error) {
                    console.error('获取详情失败:', error);
                } finally {
                    loading.value = false;
                }
            };

            // 关闭详情
            const closeDetail = () => {
                selectedCatId.value = null;
                catDetail.value = null;
            };

            // 投喂
            const handleFeed = () => {
                if (catDetail.value.feed) {
                    alert(`你投喂了 ${catDetail.value.name}！🐟`);
                } else {
                    alert(`${catDetail.value.name} 现在不需要投喂哦`);
                }
            };

            onMounted(() => {
                fetchCats();
            });

            return {
                cats,
                filteredCats,
                selectedCatId,
                catDetail,
                loading,
                searchQuery,
                filterFeed,
                showDetail,
                closeDetail,
                handleFeed
            };
        }
    }).mount('#app');
</script>
</body>
</html>
