<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 校园猫咪</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 460px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .register-header h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .register-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .success-msg {
            background: #efe;
            color: #2a5;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            gap: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="register-container">
        <a href="/index.html" class="back-link">← 返回首页</a>

        <div class="register-header">
            <h1>🐱 加入校园猫咪</h1>
            <p>创建账号，开始记录校园里的可爱猫咪</p>
        </div>

        <div class="error-msg" :class="{ show: errorMessage }">
            {{ errorMessage }}
        </div>
        <div class="success-msg" :class="{ show: successMessage }">
            {{ successMessage }}
        </div>

        <form @submit.prevent="handleRegister">
            <div class="form-group">
                <label for="username">用户名 *</label>
                <input
                        type="text"
                        id="username"
                        v-model="form.username"
                        placeholder="请输入用户名（2-20位字符）"
                        required
                        minlength="2"
                        maxlength="20"
                />
            </div>
            <div class="form-group">
                <label for="phonenumber">手机号 *</label>
                <input
                        type="tel"
                        id="phonenumber"
                        v-model="form.phonenumber"
                        placeholder="请输入手机号"
                        required
                        pattern="^1[3-9]\d{9}$"
                />
            </div>
            <div class="form-group">
                <label for="password">密码 *</label>
                <input
                        type="password"
                        id="password"
                        v-model="form.password"
                        placeholder="请输入密码（至少6位）"
                        required
                        minlength="6"
                />
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码 *</label>
                <input
                        type="password"
                        id="confirmPassword"
                        v-model="form.confirmPassword"
                        placeholder="请再次输入密码"
                        required
                />
            </div>
            <button type="submit" class="btn-submit" :disabled="isLoading">
                {{ isLoading ? '注册中...' : '注 册' }}
            </button>
        </form>

        <div class="footer">
            已有账号？<a href="/login.html">立即登录</a>
        </div>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const form = ref({
                username: '',
                phonenumber: '',
                password: '',
                confirmPassword: ''
            });
            const isLoading = ref(false);
            const errorMessage = ref('');
            const successMessage = ref('');

            const handleRegister = async () => {
                if (form.value.password !== form.value.confirmPassword) {
                    errorMessage.value = '两次输入的密码不一致';
                    return;
                }
                if (form.value.password.length < 6) {
                    errorMessage.value = '密码长度至少为6位';
                    return;
                }
                const phoneRegex = /^1[3-9]\d{9}$/;
                if (!phoneRegex.test(form.value.phonenumber)) {
                    errorMessage.value = '请输入正确的手机号格式';
                    return;
                }

                isLoading.value = true;
                errorMessage.value = '';
                successMessage.value = '';

                try {
                    const response = await axios.post('/api/user/register', {
                        username: form.value.username,
                        phonenumber: form.value.phonenumber,
                        password: form.value.password
                    }, {
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (response.data.success) {
                        successMessage.value = '注册成功！即将跳转到登录页面...';
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 1500);
                    } else {
                        errorMessage.value = response.data.message || '注册失败';
                    }
                } catch (error) {
                    if (error.response) {
                        errorMessage.value = error.response.data.message || '注册失败，用户名可能已存在';
                    } else {
                        errorMessage.value = '网络错误，请检查连接';
                    }
                } finally {
                    isLoading.value = false;
                }
            };

            return { form, isLoading, errorMessage, successMessage, handleRegister };
        }
    }).mount('#app');
</script>
</body>
</html>
