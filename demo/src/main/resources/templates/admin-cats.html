<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猫咪管理 - HZAU 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .no-auth-container {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .no-auth-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .no-auth-box h2 { color: #e74c3c; margin-bottom: 16px; }
        .no-auth-box p { color: #666; margin-bottom: 24px; }
        .no-auth-box a {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
        }

        .admin-container { display: none; min-height: 100vh; }
        .admin-header {
            background: white;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-header .logo {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .admin-header .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #666;
            font-size: 14px;
        }
        .logout-btn {
            padding: 6px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: #e0e0e0; }

        .admin-main {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 24px;
            color: #1a1a2e;
        }
        .add-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .cats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .cat-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #f0f0f0;
            position: relative;
        }
        .cat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }
        .cat-card.context-menu-active {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .cat-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .cat-info {
            padding: 20px;
        }
        .cat-name {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .cat-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .cat-tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .tag-type { background: #e3f2fd; color: #1565c0; }
        .tag-age { background: #fff3e0; color: #e65100; }
        .tag-health { background: #e8f5e9; color: #2e7d32; }
        .tag-jueyu { background: #fce4ec; color: #c2185b; }
        .cat-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            font-size: 13px;
            color: #888;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-size: 18px;
            color: #666;
            margin-bottom: 8px;
        }

        .context-menu {
            position: fixed;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 8px 0;
            min-width: 160px;
            z-index: 1000;
            display: none;
        }
        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .context-menu-item:hover { background: #f5f5f5; }
        .context-menu-item.delete { color: #e74c3c; }
        .context-menu-item.delete:hover { background: #fee; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal h2 {
            margin-bottom: 24px;
            color: #1a1a2e;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }
        .form-group input:focus,
        .form-group select:focus { border-color: #667eea; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #667eea;
        }
        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .btn-secondary {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 16px 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 300;
            animation: slideIn 0.3s ease-out;
        }
        .toast.show { display: flex; }
        .toast.success { border-left: 4px solid #2ecc71; }
        .toast.error { border-left: 4px solid #e74c3c; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .admin-main { padding: 20px; }
            .cats-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- 无权限页面 -->
<div class="no-auth-container" id="noAuthPage">
    <div class="no-auth-box">
        <h2>⚠️ 无权限访问</h2>
        <p>您需要管理员身份才能访问此页面</p>
        <a href="/admin.html">前往登录</a>
    </div>
</div>

<!-- 管理后台 -->
<div class="admin-container" id="adminPage">
    <header class="admin-header">
        <div class="logo" onclick="location.href='admin.html'">
            <span>🐾</span>
            <span>HZAU 管理后台</span>
        </div>
        <div class="user-info">
            <span id="adminName">管理员</span>
            <button class="logout-btn" onclick="doLogout()">退出登录</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="page-header">
            <h1>🐱 猫咪管理</h1>
            <button class="add-btn" onclick="openAddModal()">
                <span>+</span>
                <span>新增猫咪</span>
            </button>
        </div>

        <div id="catsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载猫咪数据...</p>
            </div>
        </div>
    </main>
</div>

<!-- 右键菜单 -->
<div class="context-menu" id="contextMenu">
    <div class="context-menu-item" onclick="editCat()">
        <span>✏️</span>
        <span>编辑信息</span>
    </div>
    <div class="context-menu-item delete" onclick="deleteCat()">
        <span>🗑️</span>
        <span>删除猫咪</span>
    </div>
</div>

<!-- 新增/编辑猫咪弹窗 -->
<div class="modal-overlay" id="catModal">
    <div class="modal">
        <h2 id="modalTitle">新增猫咪</h2>
        <form id="catForm" onsubmit="saveCat(event)">
            <input type="hidden" id="catId">

            <div class="form-group">
                <label>猫咪名称 *</label>
                <input type="text" id="catName" required placeholder="请输入猫咪名称">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>年龄</label>
                    <input type="number" id="catAge" min="0" placeholder="请输入年龄">
                </div>
                <div class="form-group">
                    <label>品种 *</label>
                    <input type="text" id="catType" required placeholder="如：橘猫、狸花猫">
                </div>
            </div>

            <div class="form-group">
                <label>健康状态</label>
                <input type="text" id="catHealth" placeholder="如：健康、生病、康复中">
            </div>

            <div class="form-group">
                <label>默认展示图片 URL</label>
                <input type="text" id="catImage" placeholder="/pictures/xxx.jpg">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" id="catJueyu">
                        <span>已绝育</span>
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox-group">
                        <input type="checkbox" id="catFeed">
                        <span>需要投喂</span>
                    </label>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal()">取消</button>
                <button type="submit" class="btn-primary" id="saveBtn">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- Toast 提示 -->
<div class="toast" id="toast">
    <span id="toastIcon"></span>
    <span id="toastMsg"></span>
</div>

<script>
    let currentCats = [];
    let selectedCatId = null;
    let isEditing = false;

    window.onload = function() {
        checkAdminAuth();
    };

    // 检查管理员权限
    async function checkAdminAuth() {
        try {
            const response = await fetch('/api/user/current', { credentials: 'include' });
            if (!response.ok) throw new Error('未登录');
            const user = await response.json();

            if (user && user.role === 'ADMIN') {
                document.getElementById('adminName').textContent = user.username || '管理员';
                showAdmin();
                loadCats();
            } else {
                showNoAuth();
            }
        } catch (error) {
            showNoAuth();
        }
    }

    function showAdmin() {
        document.getElementById('noAuthPage').style.display = 'none';
        document.getElementById('adminPage').style.display = 'block';
    }

    function showNoAuth() {
        document.getElementById('noAuthPage').style.display = 'flex';
        document.getElementById('adminPage').style.display = 'none';
    }

    // ========== 关键修复：调用 /api/admin/cats/all 获取完整字段 ==========
    async function loadCats() {
        const container = document.getElementById('catsContainer');
        try {
            const response = await fetch('/api/admin/cats/all', { credentials: 'include' });
            if (!response.ok) throw new Error('加载失败：' + response.status);

            const cats = await response.json();
            currentCats = cats;
            console.log('获取到的猫咪数据:', cats); // 调试用

            if (!cats || cats.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🐱</div>
                        <h3>还没有猫咪</h3>
                        <p>点击右上角"新增猫咪"按钮添加第一只猫咪吧</p>
                    </div>
                `;
                return;
            }

            const html = cats.map(cat => `
                <div class="cat-card"
                     data-id="${cat.id}"
                     onclick="goToDetail(${cat.id})"
                     oncontextmenu="showContextMenu(event, ${cat.id})">
                    <img src="${cat.image || '/pictures/default-cat.jpg'}"
                         alt="${escapeHtml(cat.name)}"
                         class="cat-image"
                         onerror="this.src='/pictures/default-cat.jpg'">
                    <div class="cat-info">
                        <div class="cat-name">${escapeHtml(cat.name || '未命名')}</div>
                        <div class="cat-meta">
                            <span class="cat-tag tag-type">${escapeHtml(cat.type || '未知品种')}</span>
                            <span class="cat-tag tag-age">${cat.age != null ? cat.age + '岁' : '年龄未知'}</span>
                            ${cat.health ? `<span class="cat-tag tag-health">${escapeHtml(cat.health)}</span>` : ''}
                            ${cat.jueyu ? '<span class="cat-tag tag-jueyu">已绝育</span>' : ''}
                        </div>
                        <div class="cat-status">
                            <span>${cat.feed ? '🍽️ 需投喂' : '✅ 状态正常'}</span>
                            <span>ID: ${cat.id}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `<div class="cats-grid">${html}</div>`;
        } catch (error) {
            console.error('加载猫咪失败:', error);
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <h3>加载失败</h3>
                    <p>${error.message}</p>
                </div>
            `;
        }
    }

    function goToDetail(catId) {
        window.location.href = `admin-catdetail.html?id=${catId}`;
    }

    // 右键菜单
    function showContextMenu(event, catId) {
        event.preventDefault();
        event.stopPropagation();
        selectedCatId = catId;

        const menu = document.getElementById('contextMenu');
        const card = document.querySelector(`[data-id="${catId}"]`);

        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('context-menu-active'));
        if (card) card.classList.add('context-menu-active');

        menu.style.display = 'block';
        menu.style.left = event.pageX + 'px';
        menu.style.top = event.pageY + 'px';
    }

    document.addEventListener('click', function() {
        document.getElementById('contextMenu').style.display = 'none';
        document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('context-menu-active'));
    });

    // 编辑猫咪
    function editCat() {
        if (!selectedCatId) return;
        const cat = currentCats.find(c => c.id === selectedCatId);
        if (!cat) return;

        isEditing = true;
        document.getElementById('modalTitle').textContent = '编辑猫咪';
        document.getElementById('catId').value = cat.id;
        document.getElementById('catName').value = cat.name || '';
        document.getElementById('catAge').value = cat.age != null ? cat.age : '';
        document.getElementById('catType').value = cat.type || '';
        document.getElementById('catHealth').value = cat.health || '';
        document.getElementById('catImage').value = cat.image || '';
        document.getElementById('catJueyu').checked = cat.jueyu || false;
        document.getElementById('catFeed').checked = cat.feed || false;

        document.getElementById('catModal').classList.add('active');
    }

    // ========== 关键修复：调用 /api/admin/cats/{id} DELETE ==========
    async function deleteCat() {
        if (!selectedCatId) return;
        if (!confirm('确定要删除这只猫咪吗？此操作将同时删除所有相关图片，且不可恢复！')) return;

        try {
            const response = await fetch(`/api/admin/cats/${selectedCatId}`, {
                method: 'DELETE',
                credentials: 'include'
            });

            const result = await response.json();

            if (response.ok && result.success) {
                showToast('🗑️', '猫咪及相关图片已删除', 'success');
                loadCats();
            } else {
                throw new Error(result.message || '删除失败');
            }
        } catch (error) {
            showToast('❌', error.message || '删除失败', 'error');
        }
    }

    function openAddModal() {
        isEditing = false;
        document.getElementById('modalTitle').textContent = '新增猫咪';
        document.getElementById('catForm').reset();
        document.getElementById('catId').value = '';
        document.getElementById('catModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('catModal').classList.remove('active');
    }

    // ========== 关键修复：调用 /api/admin/cats POST/PUT ==========
    async function saveCat(event) {
        event.preventDefault();
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';

        try {
            const catData = {
                name: document.getElementById('catName').value.trim(),
                age: parseInt(document.getElementById('catAge').value) || 0,
                type: document.getElementById('catType').value.trim(),
                health: document.getElementById('catHealth').value.trim(),
                image: document.getElementById('catImage').value.trim(),
                jueyu: document.getElementById('catJueyu').checked,
                feed: document.getElementById('catFeed').checked
            };

            const catId = document.getElementById('catId').value;
            let url, method;

            if (isEditing && catId) {
                url = `/api/admin/cats/${catId}`;
                method = 'PUT';
            } else {
                url = '/api/admin/cats';
                method = 'POST';
            }

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(catData)
            });

            const result = await response.json();

            if (response.ok && result.success) {
                showToast('✅', isEditing ? '猫咪信息已更新' : '猫咪添加成功', 'success');
                closeModal();
                loadCats();
            } else {
                throw new Error(result.message || '保存失败');
            }
        } catch (error) {
            showToast('❌', error.message || '保存失败', 'error');
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = '保存';
        }
    }

    async function doLogout() {
        try {
            await fetch('/api/user/logout', { method: 'POST', credentials: 'include' });
        } catch (error) {
            console.error('退出失败:', error);
        } finally {
            location.href = '/index.html';
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showToast(icon, msg, type) {
        const toast = document.getElementById('toast');
        document.getElementById('toastIcon').textContent = icon;
        document.getElementById('toastMsg').textContent = msg;
        toast.className = `toast ${type} show`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    document.getElementById('catModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
</script>
</body>
</html>
