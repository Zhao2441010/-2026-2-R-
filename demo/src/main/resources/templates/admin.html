<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - HZAU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        /* 登录页面 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 380px;
            text-align: center;
        }
        .login-box h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .login-box .subtitle {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .input-group input:focus {
            border-color: #667eea;
        }
        .input-group label {
            position: absolute;
            left: 16px;
            top: 14px;
            color: #999;
            font-size: 15px;
            pointer-events: none;
            transition: all 0.3s;
            background: white;
            padding: 0 4px;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -10px;
            font-size: 12px;
            color: #667eea;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
        }
        /* 管理后台 */
        .admin-container {
            display: none;
            min-height: 100vh;
        }
        .admin-header {
            background: white;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-header .logo {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-header .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #666;
            font-size: 14px;
        }
        .logout-btn {
            padding: 6px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            color: #666;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: #e0e0e0;
        }
        .admin-main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .welcome-section {
            margin-bottom: 40px;
        }
        .welcome-section h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .welcome-section p {
            color: #888;
            font-size: 15px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        .manage-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #f0f0f0;
            position: relative;
            overflow: hidden;
        }
        .manage-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.3s;
            transform-origin: left;
        }
        .manage-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            border-color: #e0e0e0;
        }
        .manage-card:hover::before {
            transform: scaleX(1);
        }
        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .card-cat .card-icon { background: #fff3e0; }
        .card-volunteer .card-icon { background: #e3f2fd; }
        .card-apply .card-icon { background: #f3e5f5; }
        .manage-card h3 {
            font-size: 18px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .manage-card p {
            color: #888;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .card-cat .card-tag { background: #fff3e0; color: #e65100; }
        .card-volunteer .card-tag { background: #e3f2fd; color: #1565c0; }
        .card-apply .card-tag { background: #f3e5f5; color: #7b1fa2; }
        .arrow {
            color: #ccc;
            font-size: 18px;
            transition: transform 0.3s, color 0.3s;
        }
        .manage-card:hover .arrow {
            transform: translateX(4px);
            color: #667eea;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-item {
            background: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #f0f0f0;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }
        .stat-label {
            color: #888;
            font-size: 13px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        .shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        @media (max-width: 768px) {
            .login-box { width: 90%; padding: 30px 20px; }
            .admin-main { padding: 20px; }
            .cards-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- 登录页面 -->
<div class="login-container" id="loginPage">
    <div class="login-box" id="loginBox">
        <a href="/index.html" class="back-link">← 返回首页</a>
        <h2>🔐 管理员登录</h2>
        <p class="subtitle">使用管理员账号登录后台</p>

        <div class="input-group">
            <input type="tel" id="phoneInput" placeholder=" " autocomplete="off">
            <label for="phoneInput">管理员手机号</label>
        </div>

        <div class="input-group">
            <input type="password" id="passwordInput" placeholder=" " autocomplete="off">
            <label for="passwordInput">密码</label>
        </div>

        <button class="login-btn" id="loginBtn" onclick="doLogin()">进入后台</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<!-- 管理后台 -->
<div class="admin-container" id="adminPage">
    <header class="admin-header">
        <div class="logo">🐾 HZAU 管理后台</div>
        <div class="user-info">
            <span id="adminName">管理员</span>
            <button class="logout-btn" onclick="doLogout()">退出登录</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="welcome-section fade-in">
            <h1>欢迎回来，管理员 👋</h1>
            <p>请选择一个模块进行管理操作</p>
        </div>

        <div class="stats-row fade-in">
            <div class="stat-item">
                <div class="stat-number" id="catCount">--</div>
                <div class="stat-label">当前猫咪</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="volunteerCount">--</div>
                <div class="stat-label">志愿活动</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="applyCount">--</div>
                <div class="stat-label">反馈与申请</div>
            </div>
        </div>

        <div class="cards-grid fade-in">
            <div class="manage-card card-cat" onclick="goToPage('admin-cats.html')">
                <div class="card-icon">🐱</div>
                <h3>猫咪管理</h3>
                <p>管理校园猫咪信息，包括添加、编辑、删除猫咪档案，查看猫咪状态等。</p>
                <div class="card-footer">
                    <span class="card-tag">当前猫咪</span>
                    <span class="arrow">→</span>
                </div>
            </div>

            <div class="manage-card card-volunteer" onclick="goToPage('admin-tasks.html')">
                <div class="card-icon">🤝</div>
                <h3>志愿活动管理</h3>
                <p>发布和管理志愿活动，审核志愿者报名，安排活动日程，统计参与情况。</p>
                <div class="card-footer">
                    <span class="card-tag">当前志愿活动</span>
                    <span class="arrow">→</span>
                </div>
            </div>

            <div class="manage-card card-apply" onclick="goToPage('admin-logs.html')">
                <div class="card-icon">📋</div>
                <h3>申请信息管理</h3>
                <p>查看和处理各类申请信息，包括领养申请、救助申请、反馈建议等。</p>
                <div class="card-footer">
                    <span class="card-tag">当前申请信息</span>
                    <span class="arrow">→</span>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // 页面加载时检查登录状态
    window.onload = function() {
        checkAdminAuth();
    };

    // 检查管理员权限
    async function checkAdminAuth() {
        try {
            const response = await fetch('/api/user/current', { credentials: 'include' });
            if (!response.ok) throw new Error('未登录');
            const user = await response.json();

            if (user && user.role === 'ADMIN') {
                showAdmin();
                loadStats();
                document.getElementById('adminName').textContent = user.username || '管理员';
            } else {
                showLoginPage();
            }
        } catch (error) {
            showLoginPage();
        }
    }

    function showLoginPage() {
        document.getElementById('loginPage').style.display = 'flex';
        document.getElementById('adminPage').style.display = 'none';
    }

    // 登录 - 复用统一登录接口
    async function doLogin() {
        const phoneInput = document.getElementById('phoneInput');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        const loginBox = document.getElementById('loginBox');
        const loginBtn = document.getElementById('loginBtn');

        const phonenumber = phoneInput.value.trim();
        const password = passwordInput.value;

        if (!phonenumber || !password) {
            errorMsg.textContent = '请输入手机号和密码';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = '登录中...';
        errorMsg.textContent = '';

        try {
            const response = await fetch('/api/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ phonenumber, password })
            });

            const result = await response.json();

            if (result.success && result.role === 'ADMIN') {
                showAdmin();
                loadStats();
                // username 在 user 对象中
                document.getElementById('adminName').textContent = (result.user && result.user.username) || '管理员';
            } else if (result.success && result.role !== 'ADMIN') {
                errorMsg.textContent = '该账号不是管理员，无法进入后台';
                phoneInput.value = '';
                passwordInput.value = '';
            } else {
                throw new Error(result.message || '登录失败');
            }
        } catch (error) {
            errorMsg.textContent = error.message || '手机号或密码错误';
            loginBox.classList.add('shake');
            setTimeout(() => loginBox.classList.remove('shake'), 500);
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = '进入后台';
        }
    }

    // 回车登录
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doLogin();
    });
    document.getElementById('phoneInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doLogin();
    });

    // 显示管理后台
    function showAdmin() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('adminPage').style.display = 'block';
    }

    // 退出登录
    async function doLogout() {
        try {
            await fetch('/api/user/logout', {
                method: 'POST',
                credentials: 'include'
            });
        } catch (error) {
            console.error('退出失败:', error);
        } finally {
            location.href = '/index.html';
        }
    }

    // 跳转页面
    function goToPage(url) {
        window.location.href = url;
    }

    // 加载统计数据
    function loadStats() {
        fetch('/api/admin/cats/count')
            .then(r => r.json())
            .then(data => { document.getElementById('catCount').textContent = data.count || 0; })
            .catch(() => { document.getElementById('catCount').textContent = '0'; });

        fetch('/api/admin/volunteers/count')
            .then(r => r.json())
            .then(data => { document.getElementById('volunteerCount').textContent = data.count || 0; })
            .catch(() => { document.getElementById('volunteerCount').textContent = '0'; });

        fetch('/api/admin/applications/pending-count')
            .then(r => r.json())
            .then(data => { document.getElementById('applyCount').textContent = data.count || 0; })
            .catch(() => { document.getElementById('applyCount').textContent = '0'; });
    }
</script>
</body>
</html>
