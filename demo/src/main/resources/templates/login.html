<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 校园猫咪</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-header h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .error-msg {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            gap: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-container">
        <a href="/index.html" class="back-link">← 返回首页</a>

        <div class="login-header">
            <h1>🐱 欢迎回来</h1>
            <p>使用手机号登录你的账号</p>
        </div>

        <div class="error-msg" :class="{ show: errorMessage }">
            {{ errorMessage }}
        </div>

        <form @submit.prevent="handleLogin">
            <div class="form-group">
                <label for="phonenumber">手机号</label>
                <input
                        type="tel"
                        id="phonenumber"
                        v-model="form.phonenumber"
                        placeholder="请输入手机号"
                        required
                        pattern="^1[3-9]\d{9}$"
                />
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input
                        type="password"
                        id="password"
                        v-model="form.password"
                        placeholder="请输入密码"
                        required
                />
            </div>
            <button type="submit" class="btn-submit" :disabled="isLoading">
                {{ isLoading ? '登录中...' : '登 录' }}
            </button>
        </form>

        <div class="footer">
            还没有账号？<a href="/register.html">立即注册</a>
        </div>
    </div>
</div>

<script>
    const { createApp, ref } = Vue;

    createApp({
        setup() {
            const form = ref({
                phonenumber: '',
                password: ''
            });
            const isLoading = ref(false);
            const errorMessage = ref('');

            const handleLogin = async () => {
                // 前端手机号格式校验
                const phoneRegex = /^1[3-9]\d{9}$/;
                if (!phoneRegex.test(form.value.phonenumber)) {
                    errorMessage.value = '请输入正确的手机号格式';
                    return;
                }

                isLoading.value = true;
                errorMessage.value = '';

                try {
                    // 调用 UserController 的 login 接口：phonenumber + password
                    const response = await axios.post('/api/user/login', {
                        phonenumber: form.value.phonenumber,
                        password: form.value.password
                    }, {
                        withCredentials: true,
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (response.data.success) {
                        alert('登录成功！欢迎回来 🐱');
                        window.location.href = '/index.html';
                    } else {
                        errorMessage.value = response.data.message || '登录失败';
                    }
                } catch (error) {
                    if (error.response) {
                        errorMessage.value = error.response.data.message || '手机号或密码错误';
                    } else {
                        errorMessage.value = '网络错误，请检查连接';
                    }
                } finally {
                    isLoading.value = false;
                }
            };

            return { form, isLoading, errorMessage, handleLogin };
        }
    }).mount('#app');
</script>
</body>
</html>
