spring:
  application:
    name: cat_system

  datasource:
    url: jdbc:mysql://localhost:3306/cat_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: Zhao123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # ddl-auto选项: create(每次重建), create-drop, update(推荐开发用), validate, none(生产用)
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        # 命名策略
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false

logging:
  level:
    root: INFO
    com.example.demo: DEBUG
    # 打印SQL参数
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE