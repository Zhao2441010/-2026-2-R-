spring.application.name=demo
spring.main.banner-mode=off

# -------- 核心日志控制 --------
logging.level.root=ERROR

# Spring 系列（更彻底）
logging.level.org.springframework=OFF
logging.level.org.springframework.boot=OFF
logging.level.org.springframework.core=OFF
logging.level.org.springframework.beans=OFF
logging.level.org.springframework.context=OFF
logging.level.org.springframework.web=OFF
logging.level.org.springframework.test=OFF
logging.level.org.springframework.data=OFF

# Hibernate 系列（更彻底）
logging.level.org.hibernate=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type=OFF
logging.level.org.hibernate.orm.jdbc=OFF
logging.level.org.hibernate.engine=OFF

# 关键：禁用 Hibernate 的 SQL 日志（必须添加）
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Tomcat / Catalina
logging.level.org.apache=OFF
logging.level.org.apache.catalina=OFF
logging.level.org.apache.tomcat=OFF
logging.level.org.apache.coyote=OFF

# HikariCP 连接池（经常输出连接信息）
logging.level.com.zaxxer.hikari=OFF

# 其他常见噪音
logging.level.sun.rmi=OFF
logging.level.javax.management=OFF
logging.level.jdk.event.security=OFF

# -------- 只保留自己代码 --------
logging.level.com.example.demo=DEBUG

# -------- 输出到文件 --------
logging.file.name=logs/app.log